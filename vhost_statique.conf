<VirtualHost *:80>
    ServerName static.depistage.eu
    DocumentRoot /var/www/depistage.eu/public

    # N'autoriser que la lecture des fichiers statiques
    <Directory /var/www/depistage.eu/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Bloquer l'exécution de PHP sur ce vhost (Mesure de sécurité)
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>

        # En-têtes de cache pour les performances (si mod_expires activé)
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType image/png "access plus 1 month"
            ExpiresByType image/jpeg "access plus 1 month"
            ExpiresByType text/css "access plus 1 week"
            ExpiresByType application/javascript "access plus 1 week"
        </IfModule>
    </Directory>
</VirtualHost>
